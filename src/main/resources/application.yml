qaai:
  retell:
    api-key: ${RETELL_API_KEY:}
    agent-id: ${RETELL_AGENT_ID:}
    from-number: ${RETELL_FROM_NUMBER:}
    base-url: ${RETELL_BASE_URL:https://api.retellai.com}
    api-timeout: ${RETELL_API_TIMEOUT:30s}
    recording-download-timeout: ${RETELL_RECORDING_DOWNLOAD_TIMEOUT:60s}
  analysis:
    provider: ${QAAI_ANALYZER_PROVIDER:openai}
  evaluation:
    provider: ${QAAI_EVALUATOR_PROVIDER:local}
  scenario-generation:
    provider: ${QAAI_SCENARIO_GENERATOR_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    analysis-model: ${OPENAI_ANALYSIS_MODEL:gpt-4.1-mini}
    analysis-timeout: ${OPENAI_ANALYSIS_TIMEOUT:60s}
    scenario-generation-model: ${OPENAI_SCENARIO_GENERATION_MODEL:gpt-4.1-mini}
    scenario-generation-timeout: ${OPENAI_SCENARIO_GENERATION_TIMEOUT:60s}
  target:
    agent-phone-number: ${TARGET_AGENT_PHONE_NUMBER:+18054398008}
  outputs:
    base-dir: ${QAAI_OUTPUTS_BASE_DIR:outputs}
